apiVersion: v1
kind: Secret
metadata:
  name: shortvideo-secret
type: Opaque
stringData:
  JWT_SECRET: "replace-with-at-least-32-random-characters"
  MYSQL_DSN: "user:password@tcp(mysql:3306)/shortvideo?parseTime=true"
