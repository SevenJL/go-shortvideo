# ==========================================
# ShortVideo 短视频平台配置文件
# ==========================================
# 所有选项均可通过环境变量覆盖:
#   SERVER_ADDR, JWT_SECRET, REDIS_ADDR, MYSQL_DSN 等
#   (点号分隔 → 下划线大写, 如 server.addr → SERVER_ADDR)
# ==========================================

# ---- 服务配置 ----
server:
  addr: ":8080"             # 监听地址
  mode: "release"           # debug | release | test
  read_timeout: 15s
  write_timeout: 30s

# ---- JWT 鉴权 ----
jwt:
  secret: "change-me-in-production"
  ttl: 24h                  # Token 有效期

# ---- 存储配置 ----
storage:
  upload_dir: "./data/uploads"  # 视频上传目录
  max_upload_size: 500           # 最大上传文件(MB)

# ---- Redis (留空则使用内存版) ----
redis:
  addr: ""                  # 如 "localhost:6379" 留空=内存模式
  # cluster_addrs:          # 集群模式 (多个地址逗号分隔)
  #   - "host1:6379"
  #   - "host2:6379"

# ---- MySQL (留空则使用内存版) ----
mysql:
  dsn: ""                   # 如 "test:123456@tcp(127.0.0.1:3306)/testdb?parseTime=true"
  max_open_conns: 25
  max_idle_conns: 5

# ---- 功能开关 ----
features:
  seed: true                # 启动时注入演示数据
  mq_enabled: true          # 启用进程内消息队列(fanout/transcode/like-worker)
  transcode_enabled: true   # 启用 ffmpeg 转码(需安装 ffmpeg)
  reconcile_enabled: true   # 启用 Redis↔MySQL 对账
  recommend_enabled: true   # 启用推荐流

# ---- 对账配置 ----
reconcile:
  threshold: 5              # 偏差阈值(Redis vs MySQL)
  interval: 5m              # 对账间隔

# ---- 限流配置 (QPS) ----
rate_limit:
  login:    { qps: 5,  burst: 10 }    # /api/login
  upload:   { qps: 10, burst: 15 }    # /api/upload
  video:    { qps: 100, burst: 200 }  # /api/videos/*
  feed:     { qps: 50,  burst: 100 }  # /api/feed /api/rec
  user:     { qps: 20,  burst: 50 }   # /api/users/*
  fallback: { qps: 500, burst: 1000 } # 其他

# ---- 安全配置 ----
security:
  cors_allowed_origins: []    # CORS 白名单, 如 ["https://app.example.com"]; 空=禁止跨域
  permissive_cors: false      # 开发模式允许所有来源
  login_max_failures: 10      # 登录最大失败次数
  login_fail_window: 5m       # 失败计数窗口
  login_block_time: 15m       # 超阈值封禁时间
  max_body_size: 500           # 最大请求体(MB)

# ---- 阿里云 OSS (留空则使用本地存储) ----
oss:
  endpoint: ""              # oss-cn-hangzhou.aliyuncs.com
  access_key: ""
  secret_key: ""
  bucket: "shortvideo"
