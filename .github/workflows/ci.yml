name: CI

on:
  push:
    branches: ["main", "master", "develop"]
    paths-ignore: ["docs/**", "*.md"]
  pull_request:
    branches: ["main", "master"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.25.x"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - run: go test ./... -count=1 -timeout=3m
      - run: go test -race ./... -count=1 -timeout=8m
      - run: go vet ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - run: go build -ldflags="-s -w" -o bin/server ./cmd/server
      - run: go build -ldflags="-s -w" -o bin/transcode ./cmd/transcode
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: shortvideo:ci

  integration:
    name: Integration Smoke
    runs-on: ubuntu-latest
    needs: test
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: testpass
          MYSQL_DATABASE: shortvideo
        ports: ["3306:3306"]
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Start release-shaped server
        env:
          SERVER_MODE: release
          FEATURES_SEED: "false"
          JWT_SECRET: ci-test-jwt-secret-at-least-32-chars
          REDIS_ADDR: localhost:6379
          MYSQL_DSN: root:testpass@tcp(127.0.0.1:3306)/shortvideo?parseTime=true
          MQ_TYPE: redis_stream
          OSS_ENDPOINT: oss-ci.example.com
          OSS_ACCESS_KEY: ci-access-key
          OSS_SECRET_KEY: ci-secret-key
          OSS_BUCKET: shortvideo-ci
        run: |
          go build -o bin/server ./cmd/server
          ./bin/server -config config.yaml &
          echo $! > server.pid
          sleep 5
          curl -sf http://localhost:8080/healthz
          curl -sf http://localhost:8080/readyz
      - name: E2E smoke
        run: |
          curl -sf -X POST http://localhost:8080/api/users \
            -H 'Content-Type: application/json' \
            -d '{"username":"alice","password":"password123"}'
          TOKEN=$(curl -sf -X POST http://localhost:8080/api/login \
            -H 'Content-Type: application/json' \
            -d '{"username":"alice","password":"password123"}' | \
            python3 -c 'import sys,json;print(json.load(sys.stdin)["data"]["token"])')
          curl -sf -X POST http://localhost:8080/api/videos \
            -H "Authorization: Bearer $TOKEN" \
            -H 'Content-Type: application/json' \
            -d '{"title":"ci-video","play_url":"/uploads/ci.mp4"}'
          curl -sf http://localhost:8080/api/videos
          curl -sf http://localhost:8080/metrics | grep http_requests_total
      - name: Stop server
        if: always()
        run: kill $(cat server.pid) || true

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
