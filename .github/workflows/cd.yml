name: CD — Build & Deploy

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: '部署环境'
        options: ['staging', 'production']
        default: 'staging'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ============================================
  # 1. Docker Build & Push
  # ============================================
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # 2. Deploy to Staging
  # ============================================
  deploy-staging:
    name: Deploy Staging
    needs: docker
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/shortvideo
            docker compose pull server
            docker compose up -d server
            docker compose exec server curl -sf http://localhost:8080/healthz

  # ============================================
  # 3. Deploy to Production
  # ============================================
  deploy-production:
    name: Deploy Production
    needs: docker
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/shortvideo
            docker compose pull server
            docker compose up -d server
            sleep 3
            docker compose exec server curl -sf http://localhost:8080/healthz
            echo "Production deploy: OK"

  # ============================================
  # 4. GitHub Release
  # ============================================
  release:
    name: Create Release
    needs: docker
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with: { go-version: '1.25' }

      - name: Build release binaries
        run: |
          GOOS=linux   GOARCH=amd64 go build -o bin/shortvideo-linux-amd64   ./cmd/server
          GOOS=linux   GOARCH=arm64 go build -o bin/shortvideo-linux-arm64   ./cmd/server
          GOOS=darwin  GOARCH=amd64 go build -o bin/shortvideo-darwin-amd64  ./cmd/server
          GOOS=darwin  GOARCH=arm64 go build -o bin/shortvideo-darwin-arm64  ./cmd/server

      - name: Generate changelog
        run: |
          git log $(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo HEAD~10)..HEAD \
            --pretty=format:'- %s' > CHANGELOG.md

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          files: |
            bin/shortvideo-linux-amd64
            bin/shortvideo-linux-arm64
            bin/shortvideo-darwin-amd64
            bin/shortvideo-darwin-arm64
            config.yaml
